      <section class="project-brief" aria-label="陆野派项目摘要">
        <dl>
          <div>
            <dt>目标用户</dt>
            <dd>28-38 岁新能源车主与车载露营用户。</dd>
          </div>
          <div>
            <dt>核心问题</dt>
            <dd>露营手冲咖啡存在供能、收纳、出品稳定性、多人共饮和桌面秩序问题。</dd>
          </div>
          <div>
            <dt>产品定义</dt>
            <dd>构建一套车载露营手冲咖啡系统，整合研磨、加热、萃取、杯组收纳、V2L 供电、氛围灯和无线充电等模块。</dd>
          </div>
          <div>
            <dt>我的产出</dt>
            <dd>用户研究、竞品分析、场景定义、功能架构、使用流程、CMF、结构表达、实物模型与完整设计报告。</dd>
          </div>
        </dl>
      </section>
